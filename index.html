<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>半月预测 - 股票涨幅预测</title>
  <meta name="description" content="基于历史数据的股票15日涨幅预测工具">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- === APP CONTAINER === -->
<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <div class="header-top">
      <div class="header-title">
        <div class="logo">P</div>
        <div>
          <h1><span>半月</span>预测</h1>
          <div class="subtitle">基于历史数据的15日股价趋势预测</div>
        </div>
      </div>
      <div class="header-controls">
        <div class="update-info" id="updateInfo">
          <span class="dot"></span> 加载中...
        </div>
        <button class="btn btn-primary" id="refreshBtn">
          &#x21bb; 刷新数据
        </button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-section">
      <div class="search-wrapper">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="输入股票代码搜索 (如 AAPL, TSLA)..." autocomplete="off">
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
      <span style="font-size:0.75rem;color:var(--text-muted);">点击卡片查看详细走势图</span>
    </div>
  </header>

  <!-- Stock Grid -->
  <div class="stock-grid" id="stockGrid">
    <div class="empty-state">
      <span class="empty-icon">&#9203;</span>
      <h3>正在获取数据...</h3>
      <p>请稍候，正在从市场获取最新行情</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="app-footer">
    <p>
      数据来源：Yahoo Finance &#8226; 预测算法：加权线性回归 + 动量调整 &#8226;
      <span class="disclaimer">免责声明：以上预测仅供参考，不构成投资建议。</span>
      <br>
      预测结果基于历史价格走势，无法保证未来表现。投资有风险，入市需谨慎。
    </p>
  </footer>
</div>

<!-- === CHART MODAL === -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" id="modalCloseBtn">&#10005;</button>

    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Loading...</div>
    </div>

    <div class="modal-stats">
      <div class="modal-stat">
        <div class="stat-label">当前价格</div>
        <div class="stat-value" id="modalCurrentPrice">--</div>
      </div>
      <div class="modal-stat">
        <div class="stat-label">15日预测</div>
        <div class="stat-value" id="modalPredictedPrice">--</div>
      </div>
      <div class="modal-stat">
        <div class="stat-label">预测涨跌幅</div>
        <div class="stat-value" id="modalChange">--</div>
      </div>
      <div class="modal-stat">
        <div class="stat-label">可信度</div>
        <div class="stat-value" id="modalConfidence">--</div>
      </div>
      <div class="modal-stat">
        <div class="stat-label">年化波动率</div>
        <div class="stat-value" id="modalVolatility">--</div>
      </div>
    </div>

    <div class="chart-wrapper">
      <canvas id="stockChart"></canvas>
    </div>
  </div>
</div>

<!-- === SCRIPTS === -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>

<style>
  /* Hide loading overlay / cards until fonts and assets are ready */
  .stock-card .loading-overlay .spinner::after {
    content: '';
    display: block;
    width: 24px;
    height: 24px;
    border: 3px solid var(--border-color);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
</style>
</body>
</html>
